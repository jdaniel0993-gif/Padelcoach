                          </div>
                          {cat.skills.map(skill=>{
                            const val=latestCoachScores[skill.id]??null;
                            return(
                              <div key={skill.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
                                <span style={{flex:1,fontSize:12,color:C.text,fontWeight:600}}>{skill.label}</span>
                                <span style={{fontSize:14,fontWeight:800,color:val!==null?scColor(val):C.muted,minWidth:28,textAlign:"center"}}>{val!==null?val:"N/A"}</span>
                                {FUERZA_KEYS.map(k=>{
                                  const thresh=thresholds?.[skill.id]?.[k]??null;
                                  const met=val!==null&&thresh!==null&&thresh!=="NA"&&val>=Number(thresh);
                                  return(<span key={k} style={{fontSize:10,fontWeight:700,minWidth:24,textAlign:"center",color:met?FUERZA_COLORS[k]:C.border}}>{thresh!==null&&thresh!=="NA"?thresh:"—"}</span>);
                                })}
                              </div>
                            );
                          })}
                        </div>
                      );
                    })()}
                  </>
                ):(
                  <div style={{textAlign:"center",padding:60,color:C.muted}}>
                    <div style={{fontSize:40,marginBottom:12}}>📊</div>
                    <div style={{fontSize:14,fontWeight:600}}>Sin evaluaciones aún</div>
                    <div style={{fontSize:12,marginTop:8}}>Tu coach aún no ha registrado una evaluación</div>
                  </div>
                )}
              </div>
            )}

            {activeTab==="compare"&&(
              <div>
                {evalPool.length<2?(
                  <div style={{textAlign:"center",padding:60,color:C.muted}}>
                    <div style={{fontSize:40,marginBottom:12}}>⚖️</div>
                    <div style={{fontSize:14,fontWeight:600}}>Necesitas al menos 2 evaluaciones</div>
                    <div style={{fontSize:12,marginTop:8}}>De coach o auto-evaluaciones propias</div>
                  </div>
                ):(
                  <>
                    <div style={{display:"flex",gap:8,marginBottom:16}}>
                      <div style={{flex:1,background:selA?C.accent+"22":C.card,borderRadius:10,padding:"8px 10px",border:`1px solid ${selA?C.accent:C.border}`}}><div style={{fontSize:9,color:selA?C.accent:C.muted,fontWeight:700,marginBottom:2}}>LADO A</div><div style={{fontSize:11,color:C.text,fontWeight:600}}>{selA?`${selA._source} · ${fmtShort(selA.date)}`:"Sin seleccionar"}</div></div>
                      <div style={{flex:1,background:selB?C.blue+"22":C.card,borderRadius:10,padding:"8px 10px",border:`1px solid ${selB?C.blue:C.border}`}}><div style={{fontSize:9,color:selB?C.blue:C.muted,fontWeight:700,marginBottom:2}}>LADO B</div><div style={{fontSize:11,color:C.text,fontWeight:600}}>{selB?`${selB._source} · ${fmtShort(selB.date)}`:"Sin seleccionar"}</div></div>
                    </div>
                    {selA&&selB&&(
                      <div style={{marginBottom:20}}>
                        <div style={{display:"flex",justifyContent:"center",marginBottom:8}}><RadarChart scores={selA._scores} compareScores={selB._scores} size={280}/></div>
                        <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:12}}>
                          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:3,background:C.accent,borderRadius:2}}/><span style={{fontSize:11,color:C.muted}}>A · {selA._source}</span></div>
                          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:3,background:C.blue,borderRadius:2,borderStyle:"dashed"}}/><span style={{fontSize:11,color:C.muted}}>B · {selB._source}</span></div>
                        </div>
                        {SKILL_CATEGORIES.map(cat=>{
                          const catSkills=cat.skills.filter(s=>selA._scores[s.id]!==null&&selA._scores[s.id]!==undefined||selB._scores[s.id]!==null&&selB._scores[s.id]!==undefined);
                          if(!catSkills.length) return null;
                          return(<div key={cat.id} style={{marginBottom:16}}><div style={{fontSize:11,fontWeight:700,color:cat.color,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>{cat.label}</div>{catSkills.map(s=>{const vA=selA._scores[s.id]??null,vB=selB._scores[s.id]??null;const diff=vA!==null&&vB!==null?vA-vB:null;return(<div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,background:C.card,borderRadius:10,padding:"8px 12px"}}><span style={{flex:1,fontSize:12,color:C.text}}>{s.label}</span><span style={{fontSize:14,fontWeight:800,color:vA!==null?scColor(vA):C.muted,minWidth:24,textAlign:"center"}}>{vA!==null?vA:"—"}</span><span style={{fontSize:10,color:C.muted}}>vs</span><span style={{fontSize:14,fontWeight:800,color:vB!==null?scColor(vB):C.muted,minWidth:24,textAlign:"center"}}>{vB!==null?vB:"—"}</span>{diff!==null&&<span style={{fontSize:11,fontWeight:700,color:diff>0?C.success:diff<0?C.danger:C.muted,minWidth:28,textAlign:"right"}}>{diff>0?`+${diff}`:diff}</span>}</div>);})}</div>);
                        })}
                        <button onClick={()=>{setSelA(null);setSelB(null);}} style={{...btnS,marginTop:8}}>↩ Cambiar selección</button>
                      </div>
                    )}
                    <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>{selA&&selB?"Cambia selección":"Elige dos evaluaciones"}</div>
                    {evalPool.map(ev=>{
                      const isA=selA?.id===ev.id&&selA?._source===ev._source;
                      const isB=selB?.id===ev.id&&selB?._source===ev._source;
                      const avg=avgScored(ev._scores||{});
                      const isCoach=ev._source==="Coach";
                      return(<div key={ev.id+ev._source} onClick={()=>{if(isA)setSelA(null);else if(isB)setSelB(null);else if(!selA)setSelA(ev);else if(!selB)setSelB(ev);}} style={{background:isA?C.accent+"22":isB?C.blue+"22":C.card,borderRadius:12,padding:12,border:`1px solid ${isA?C.accent:isB?C.blue:C.border}`,marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{ev.title}</div><div style={{display:"flex",gap:6,marginTop:3}}><span style={{fontSize:11,color:C.muted}}>{fmtDate(ev.date)}</span><Badge label={ev._source} color={isCoach?C.blue:C.accent}/></div></div><div style={{display:"flex",alignItems:"center",gap:8}}>{avg&&<span style={{fontSize:16,fontWeight:800,color:isCoach?C.blue:C.accent}}>{avg}</span>}{isA&&<Badge label="A" color={C.accent}/>}{isB&&<Badge label="B" color={C.blue}/>}</div></div>);
                    })}
                  </>
                )}
              </div>
            )}

            {activeTab==="self"&&(
              <div>
                <div style={{background:C.card,borderRadius:14,padding:16,border:`1px solid ${C.accent}33`,marginBottom:16}}>
                  <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:6}}>Auto-evaluación</div>
                  <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:14}}>Califica tus propias habilidades. Tu coach podrá ver tu perspectiva y compararla con la suya.</div>
                  {selfStep==="done"?(
                    <div style={{textAlign:"center",padding:16}}>
                      <div style={{fontSize:32,marginBottom:8}}>✅</div>
                      <div style={{fontSize:14,fontWeight:700,color:C.success}}>¡Auto-evaluación guardada!</div>
                      <div style={{fontSize:12,color:C.muted,marginTop:4}}>Aparece en tu historial y en la comparativa</div>
                      <button onClick={()=>{setSelfStep("list");setSelfScores(emptySessionScores());setSelfCatIdx(0);}} style={{...btnS,marginTop:16}}>Nueva auto-evaluación</button>
                    </div>
                  ):(
                    <button onClick={()=>{setSelfScores(emptySessionScores());setSelfCatIdx(0);setSelfStep("scoring");}} style={btnP}>✍️ Iniciar auto-evaluación</button>
                  )}
                </div>
                {selfSessions.length>0&&(
                  <div>
                    <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Mis evaluaciones anteriores</div>
                    {selfSessions.map(s=>{const sc=typeof s.scores==="string"?JSON.parse(s.scores):s.scores||{};const avg=avgScored(sc);return(<div key={s.id} onClick={()=>{setSelectedSelfSession(s);setSelfScores(typeof s.scores==="string"?JSON.parse(s.scores):{...s.scores});setSelfCatIdx(0);setSelfStep("editing");}} style={{background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.accent}33`,marginBottom:8,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{s.title}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{fmtDate(s.date)} · <span style={{color:C.accent}}>toca para editar</span></div></div>{avg&&<span style={{fontSize:20,fontWeight:800,color:C.accent}}>{avg}</span>}</div></div>);})}
                  </div>
                )}
              </div>
            )}

            {activeTab==="sessions"&&(
              <div>
                {coachSessions.length===0?(<div style={{textAlign:"center",padding:60,color:C.muted}}><div style={{fontSize:40,marginBottom:12}}>📋</div><div style={{fontSize:14,fontWeight:600}}>Sin sesiones aún</div></div>):(
                  coachSessions.map(s=>{const sc=typeof s.scores==="string"?JSON.parse(s.scores):s.scores||{};const avg=avgScored(sc);const scored=Object.values(sc).filter(v=>v!==null).length;return(<div key={s.id} onClick={()=>setSelectedCoachSession(s)} style={{background:C.card,borderRadius:14,padding:14,border:`1px solid ${s.is_formal?C.accent+"44":C.border}`,marginBottom:10,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>{s.title}</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><span style={{fontSize:11,color:C.muted}}>{fmtDate(s.date)}</span>{s.is_formal&&<Badge label="Eval. formal" color={C.accent}/>}</div></div>{avg&&<div style={{textAlign:"right",flexShrink:0,marginLeft:8}}><div style={{fontSize:20,fontWeight:800,color:C.accent}}>{avg}</div><div style={{fontSize:9,color:C.muted}}>prom.</div></div>}</div><div style={{fontSize:11,color:C.muted}}>{scored} skills calificados{s.content?` · 📝`:""}</div></div>);})
                )}
              </div>
            )}

            {activeTab==="notas"&&(
              <div>
                {editingNote&&<NoteEditModal note={editingNote} onCancel={()=>setEditingNote(null)} onSave={async(text)=>{await sb.patch(SUPABASE_KEY,"player_notes",editingNote.id,{text});setEditingNote(null);loadData();showToast("Nota actualizada");}}/>}
                <div style={{fontSize:11,fontWeight:700,color:C.blue,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>📤 Notas de tu coach</div>
                {notes.filter(n=>n.source==="coach"&&n.shared).length===0&&(<div style={{textAlign:"center",padding:"12px 0 20px",color:C.muted,fontSize:12}}>Tu coach no ha compartido notas aún</div>)}
                {notes.filter(n=>n.source==="coach"&&n.shared).map(n=>(<div key={n.id} style={{background:C.blue+"11",borderRadius:12,padding:12,border:`1px solid ${C.blue}33`,marginBottom:8}}><div style={{fontSize:13,color:C.text,lineHeight:1.5}}>{n.text}</div><div style={{fontSize:10,color:C.muted,marginTop:6}}>{fmtDate(n.created_at)}</div></div>))}
                <div style={{fontSize:11,fontWeight:700,color:C.accent,marginTop:20,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>✍️ Mis notas</div>
                <div style={{background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.border}`,marginBottom:12}}>
                  <textarea placeholder="Escribe tus reflexiones, metas, sensaciones..." value={selfNote} onChange={e=>setSelfNote(e.target.value)} rows={3} style={{...inp,resize:"none",marginBottom:8}}/>
                  <button onClick={saveSelfNote} disabled={savingNote} style={{...btnP,opacity:savingNote?0.7:1}}>Guardar nota</button>
                </div>
                {notes.filter(n=>n.source==="player").length===0&&<div style={{textAlign:"center",padding:"12px 0",color:C.muted,fontSize:12}}>Tus notas aparecerán aquí</div>}
                {notes.filter(n=>n.source==="player").map(n=>(<div key={n.id} style={{background:C.accent+"11",borderRadius:12,padding:12,border:`1px solid ${C.accent}33`,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",gap:8}}><div style={{fontSize:13,color:C.text,lineHeight:1.5,flex:1}}>{n.text}</div><div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}><button onClick={()=>setEditingNote(n)} style={{background:C.warning+"22",color:C.warning,border:`1px solid ${C.warning}44`,borderRadius:8,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>✏️</button><button onClick={async()=>{await sb.delete(SUPABASE_KEY,"player_notes",n.id);loadData();showToast("Nota eliminada");}} style={{background:C.danger+"22",color:C.danger,border:`1px solid ${C.danger}44`,borderRadius:8,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>🗑</button></div></div><div style={{fontSize:10,color:C.muted,marginTop:6}}>{fmtDate(n.created_at)}</div></div>))}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [token,setToken]=useState(()=>localStorage.getItem("pc_token")||null);
  const [userId,setUserId]=useState(()=>localStorage.getItem("pc_user_id")||null);
  const [coach,setCoach]=useState(null);
  const [playerSession,setPlayerSession]=useState(null);
  const [thresholds,setThresholds]=useState(DEFAULT_THRESHOLDS);
  const [tab,setTab]=useState("players");
  const [selectedPlayer,setSelectedPlayer]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!token||!userId){setLoading(false);return;}
    if(token === "dev-bypass") {
      setCoach({id:"79fc96b8-bb39-4b0b-b055-e2c2769fdb6e", user_id:userId, club_id:CLUB_ID, name:"Daniel", role:"admin"});
      setLoading(false);
      return;
    }
    Promise.all([
      sb.get(token,"coaches",`?user_id=eq.${userId}&limit=1`),
      sb.get(token,"thresholds",`?club_id=eq.${CLUB_ID}`),
    ]).then(([coaches,thresh])=>{
      if(coaches&&Array.isArray(coaches)&&coaches.length) setCoach(coaches[0]);
      else { setToken(null);setUserId(null);localStorage.removeItem("pc_token");localStorage.removeItem("pc_user_id"); }
      if(thresh&&thresh.length){
        const t={...DEFAULT_THRESHOLDS};
        for(const row of thresh) t[row.skill_id]={quinta:row.quinta??"5",cuarta:row.cuarta??"5",tercera:row.tercera??"5",segunda:row.segunda??"7",primera:row.primera??"8",open:row.open??"9"};
        setThresholds(t);
      }
      setLoading(false);
    });
  },[token,userId]);

  const handleLogin=(tok,uid)=>{setToken(tok);setUserId(uid);};
  const handlePlayerLogin=(player)=>{setPlayerSession(player);};
  const handleSignOut=async()=>{ if(token) await sb.signOut(token); localStorage.removeItem("pc_token");localStorage.removeItem("pc_user_id"); setToken(null);setUserId(null);setCoach(null);setSelectedPlayer(null); };
  const handlePlayerSignOut=()=>{setPlayerSession(null);};

  if(loading) return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',system-ui,sans-serif"}}><div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:16}}>🎾</div><Spinner/></div></div>);

  if(playerSession) return <PlayerView player={playerSession} onSignOut={handlePlayerSignOut}/>;
  if(!token||!coach) return <LoginScreen onLogin={handleLogin} onPlayerLogin={handlePlayerLogin}/>;

  if(selectedPlayer) return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Inter',system-ui,sans-serif",color:C.text}}>
      <PlayerDetail player={selectedPlayer} token={token} coachId={coach.id} coachRole={coach.role} thresholds={thresholds} onBack={(refresh)=>setSelectedPlayer(null)}/>
    </div>
  );

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Inter',system-ui,sans-serif",color:C.text}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"16px 16px 12px",paddingTop:"max(16px,env(safe-area-inset-top,16px))"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🎾</div>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:C.text,lineHeight:1}}>PádelCoach</div>
            <div style={{fontSize:10,color:C.muted}}>Advantage · {coach.name}</div>
          </div>
        </div>
      </div>
      {tab==="players"&&<PlayersTab token={token} coachId={coach.id} coachRole={coach.role} thresholds={thresholds} onSelectPlayer={setSelectedPlayer}/>}
      {tab==="sessions"&&<SessionsTab token={token} onGoToPlayer={setSelectedPlayer}/>}
      {tab==="eval"&&<EvalTab token={token} onGoToPlayer={setSelectedPlayer}/>}
      {tab==="club"&&coach.role==="admin"&&<ClubTab token={token} coachId={coach.id} coachRole={coach.role}/>}
      {tab==="config"&&<ConfigTab token={token} coachRole={coach.role} thresholds={thresholds} onThresholdsUpdate={setThresholds} coachName={coach.name} onSignOut={handleSignOut}/>}
      <BottomNav tab={tab} setTab={setTab} isAdmin={coach.role==="admin"}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

setTimeout(() => {
  const splash = document.getElementById('splash');
  if(splash) splash.classList.add('hidden');
}, 1500);
  </script>
</body>
</html>
