];
const ALL_SKILLS = SKILL_CATEGORIES.flatMap(c => c.skills.map(s => ({...s, category:c.id, categoryColor:c.color})));
const emptySessionScores = () => Object.fromEntries(ALL_SKILLS.map(s => [s.id, null]));
const fullSessionScores  = () => Object.fromEntries(ALL_SKILLS.map(s => [s.id, 0]));
const FUERZAS = ["5ta Fuerza","4ta Fuerza","3ra Fuerza","2da Fuerza","1ra Fuerza","Open"];

const FUERZA_LABELS = {"quinta":"5ta","cuarta":"4ta","tercera":"3ra","segunda":"2da","primera":"1ra","open":"Open"};
const FUERZA_COLORS = {"quinta":C.muted,"cuarta":"#74B9FF","tercera":C.blue,"segunda":C.purple,"primera":C.warning,"open":C.accent};

const calcSubcat = (birthdate) => {
  if(!birthdate) return null;
  const age = Math.floor((new Date() - new Date(birthdate)) / (365.25*24*3600*1000));
  if(age <= 10) return "Sub-10";
  if(age <= 12) return "Sub-12";
  if(age <= 14) return "Sub-14";
  if(age <= 16) return "Sub-16";
  if(age <= 18) return "Sub-18";
  return null;
};

const DEFAULT_THRESHOLDS = Object.fromEntries(ALL_SKILLS.map(s => [s.id, {quinta:"5",cuarta:"5",tercera:"5",segunda:"7",primera:"8",open:"9"}]));

// ── SCORE LOGIC ───────────────────────────────────────────────────────────────
const computeCurrentScores = (sessions) => {
  const scores = {};
  const ordered = [...sessions].sort((a,b) => new Date(a.date)-new Date(b.date));
  for (const s of ordered) {
    if (!s.scores) continue;
    const sc = typeof s.scores === "string" ? JSON.parse(s.scores) : s.scores;
    for (const [id,val] of Object.entries(sc)) { if (val !== null) scores[id] = val; }
  }
  return scores;
};

const avgScored = scores => {
  const vals = Object.values(scores).filter(v=>v!==null&&v!==undefined);
  if (!vals.length) return null;
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
};

const avgCatScored = (scores, catId) => {
  const cat = SKILL_CATEGORIES.find(c=>c.id===catId);
  const vals = cat.skills.map(s=>scores[s.id]).filter(v=>v!==null&&v!==undefined);
  if (!vals.length) return null;
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
};

const daysSinceTrainedMap = sessions => {
  const map = {};
  const now = new Date();
  for (const s of sessions) {
    if (!s.scores) continue;
    const sc = typeof s.scores === "string" ? JSON.parse(s.scores) : s.scores;
    const d = new Date(s.date+"T12:00:00");
    for (const [id,val] of Object.entries(sc)) {
      if (val !== null) {
        const days = Math.floor((now-d)/86400000);
        if (map[id]===undefined || days < map[id]) map[id] = days;
      }
    }
  }
  return map;
};

const heatColor = days => {
  if (days===undefined) return {bg:C.border, text:C.muted, label:"Nunca"};
  if (days<=7)  return {bg:C.success+"33", text:C.success, label:`${days}d`};
  if (days<=21) return {bg:C.warning+"33", text:C.warning, label:`${days}d`};
  return {bg:C.danger+"33", text:C.danger, label:`${days}d`};
};

const computeLevel = (currentScores, thresholds) => {
  const thresh = thresholds || DEFAULT_THRESHOLDS;
  const scoredSkills = ALL_SKILLS.filter(s => currentScores[s.id] !== undefined && currentScores[s.id] !== null);
  if (!scoredSkills.length) return { level:"Principiante", pctToNext:0, missing:[] };
  const missingAvanzado = scoredSkills.filter(s => (currentScores[s.id]||0) < thresh[s.id].avanzado);
  const missingIntermedio = scoredSkills.filter(s => (currentScores[s.id]||0) < thresh[s.id].intermedio);
  if (missingAvanzado.length === 0) return { level:"Avanzado", pctToNext:100, missing:[] };
  if (missingIntermedio.length === 0) {
    const achieved = scoredSkills.reduce((acc,s)=>acc+(currentScores[s.id]||0),0);
    const maxGap = scoredSkills.reduce((acc,s)=>acc+thresh[s.id].avanzado,0);
    return { level:"Intermedio", nextLevel:"Avanzado", pctToNext:Math.min(Math.round((achieved/maxGap)*100),99), missing: missingAvanzado.map(s=>({...s,current:currentScores[s.id]||0,needed:thresh[s.id].avanzado,gap:thresh[s.id].avanzado-(currentScores[s.id]||0)})).sort((a,b)=>a.gap-b.gap) };
  }
  const achieved = scoredSkills.reduce((acc,s)=>acc+(currentScores[s.id]||0),0);
  const maxGap = scoredSkills.reduce((acc,s)=>acc+thresh[s.id].intermedio,0);
  return { level:"Principiante", nextLevel:"Intermedio", pctToNext:Math.min(Math.round((achieved/maxGap)*100),99), missing: missingIntermedio.map(s=>({...s,current:currentScores[s.id]||0,needed:thresh[s.id].intermedio,gap:thresh[s.id].intermedio-(currentScores[s.id]||0)})).sort((a,b)=>a.gap-b.gap) };
};

// ── RADAR ─────────────────────────────────────────────────────────────────────
function RadarChart({scores,size=260,catId=null,compareScores=null}) {
  const cats = catId?SKILL_CATEGORIES.filter(c=>c.id===catId):SKILL_CATEGORIES;
  const skills = cats.flatMap(c=>c.skills.map(s=>({...s,color:c.color})));
  const n=skills.length; if(!n) return null;
  const cx=size/2,cy=size/2,r=size*0.36;
  const angle = i=>(Math.PI*2*i)/n-Math.PI/2;
  const pt = (i,v)=>({x:cx+r*(v/10)*Math.cos(angle(i)),y:cy+r*(v/10)*Math.sin(angle(i))});
  const dp = skills.map((s,i)=>pt(i,scores[s.id]??0));
  const path = dp.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ")+"Z";
  const dp2 = compareScores?skills.map((s,i)=>pt(i,compareScores[s.id]??0)):null;
  const path2 = dp2?dp2.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ")+"Z":null;
  return (
    <svg width={size} height={size} style={{overflow:"visible"}}>
      {[2,4,6,8,10].map(lvl=>{const pts=skills.map((_,i)=>pt(i,lvl));const p2=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ")+"Z";return <g key={lvl}><path d={p2} fill="none" stroke={C.border} strokeWidth="1" opacity="0.6"/><text x={cx} y={cy-r*lvl/10-3} textAnchor="middle" fontSize="9" fill={C.muted}>{lvl}</text></g>;})}
      {skills.map((_,i)=>{const e=pt(i,10);return <line key={i} x1={cx} y1={cy} x2={e.x} y2={e.y} stroke={C.border} strokeWidth="1" opacity="0.5"/>;})}
      {path2&&<path d={path2} fill={C.blue} fillOpacity="0.15" stroke={C.blue} strokeWidth="1.5" strokeDasharray="4,3"/>}
      <path d={path} fill={C.accent} fillOpacity="0.15" stroke={C.accent} strokeWidth="2"/>
      {dp.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3.5" fill={scores[skills[i].id]===null||scores[skills[i].id]===undefined?C.border:skills[i].color} stroke={C.bg} strokeWidth="1.5"/>)}
      {skills.map((s,i)=>{const lp=pt(i,11.8);return <text key={i} x={lp.x} y={lp.y} textAnchor="middle" dominantBaseline="middle" fontSize="8.5" fontWeight="500" fill={C.text} style={{userSelect:"none"}}>{s.label.length>12?s.label.slice(0,11)+"…":s.label}</text>;})}
    </svg>
  );
}

  const hasChanges = text.trim() !== note.text.trim();
  return (
    <div style={{position:"fixed",inset:0,background:"#000b",zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:520,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:4}}>Editar nota</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:14}}>{new Date(note.created_at).toLocaleDateString("es-MX",{day:"numeric",month:"short",year:"numeric"})}</div>
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={5} autoFocus style={{...inp,resize:"none",marginBottom:12,fontSize:14,lineHeight:1.6}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onCancel} style={{...btnS,flex:1}}>Cancelar</button>
          <button onClick={async()=>{if(!text.trim()||!hasChanges)return;setSaving(true);await onSave(text.trim());setSaving(false);}} disabled={saving||!hasChanges||!text.trim()} style={{...btnP,flex:1,opacity:(saving||!hasChanges||!text.trim())?0.5:1}}>{saving?"Guardando...":"Guardar"}</button>
        </div>
      </div>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({onLogin,onPlayerLogin}) {
  const [mode,setMode]=useState("player");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [padCode,setPadCode]=useState("");
  const [padPin,setPadPin]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");

  const handleCoachLogin = async () => {
    if(!email||!password){setError("Ingresa email y contraseña");return;}
    setLoading(true);setError("");
    let res;
    try { res = await sb.signIn(email,password); } catch(e) { setError("Network error: " + e.message); setLoading(false); return; }
    const resStr = JSON.stringify(res);
    const token = res.access_token || (res.session && res.session.access_token);
    const userId = (res.user && res.user.id) || (res.session && res.session.user && res.session.user.id);
    if(token && userId){ localStorage.setItem("pc_token", token); localStorage.setItem("pc_user_id", userId); onLogin(token, userId); }
    else { setError(res.error_description || res.message || res.msg || resStr.slice(0,300)); }
    setLoading(false);
  };

  const handlePlayerLogin = async () => {
    if(!padCode.trim()||!padPin.trim()){setError("Ingresa tu código PAD y PIN");return;}
    setLoading(true);setError("");
    const code="PAD-"+padCode.trim();
    const pin=padPin.trim();
    const players = await sb.get(SUPABASE_KEY,"players",`?invite_code=eq.${code}&invite_pin=eq.${pin}&select=*`);
    if(!players||!Array.isArray(players)||!players.length){ setError("Código o PIN incorrecto. Verifica con tu coach."); setLoading(false);return; }
    onPlayerLogin(players[0]);
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:56,height:56,borderRadius:16,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 16px"}}>🎾</div>
          <div style={{fontSize:26,fontWeight:800,color:C.text}}>PádelCoach</div>
          <div style={{fontSize:13,color:C.muted,marginTop:4}}>Advantage</div>
        </div>
        <div style={{display:"flex",background:C.card,borderRadius:12,padding:4,marginBottom:24,border:`1px solid ${C.border}`}}>
          {[["player","🎾 Alumno"],["coach","🏅 Coach"]].map(([id,label])=>(
            <button key={id} onClick={()=>{setMode(id);setError("");}} style={{flex:1,padding:"9px 0",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:mode===id?C.accent:"transparent",color:mode===id?C.bg:C.muted,transition:"all 0.15s"}}>{label}</button>
          ))}
        </div>
        {error&&<div style={{background:C.danger+"22",border:`1px solid ${C.danger}44`,borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:12,color:C.danger}}>{error}</div>}
        {mode==="player"?(
          <>
            <div style={{background:C.card,borderRadius:12,padding:12,marginBottom:16,border:`1px solid ${C.accent}33`,fontSize:12,color:C.muted,lineHeight:1.6}}>
              Tu coach te compartió un código como <strong style={{color:C.accent}}>PAD-1234</strong> y un PIN de 4 dígitos. Ingrésalos aquí.
            </div>
            <div style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
              <span style={{padding:"10px 10px 10px 14px",fontSize:16,fontWeight:800,color:C.muted,letterSpacing:"0.1em",flexShrink:0}}>PAD-</span>
              <input placeholder="XXXX" value={padCode} onChange={e=>setPadCode(e.target.value.replace(/\D/g,""))} style={{...inp,margin:0,border:"none",borderRadius:0,letterSpacing:"0.2em",fontSize:18,fontWeight:800,flex:1,background:"transparent"}} maxLength={4} type="tel"/>
            </div>
            <input placeholder="PIN (4 dígitos)" value={padPin} onChange={e=>setPadPin(e.target.value.replace(/\D/g,""))} style={{...inp,letterSpacing:"0.3em",fontSize:20,fontWeight:800,textAlign:"center"}} maxLength={4} type="tel"/>
            <button onClick={handlePlayerLogin} disabled={loading} style={{...btnP,opacity:loading?0.7:1}}>{loading?"Verificando...":"Entrar"}</button>
          </>
        ):(
          <>
            <input placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} type="email" style={inp}/>
            <input placeholder="Contraseña" value={password} onChange={e=>setPassword(e.target.value)} type="password" style={inp}/>
            <button onClick={handleCoachLogin} disabled={loading} style={{...btnP,opacity:loading?0.7:1}}>{loading?"Entrando...":"Entrar"}</button>
            <button onClick={()=>onLogin("dev-bypass", "f3ca20fd-3f26-4942-9577-bd821cc4803b")} style={{...btnS,marginTop:8,fontSize:12,opacity:0.6}}>⚡ Entrar como Daniel (Dev)</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── SESSION FORM ──────────────────────────────────────────────────────────────
function SessionForm({player,token,coachId,onBack,isFormal=false}) {
  const [form,setForm]=useState({title:isFormal?"Evaluación formal":"",content:"",date:new Date().toISOString().slice(0,10)});
  const [scores,setScores]=useState(isFormal?fullSessionScores():emptySessionScores());
  const [catIdx,setCatIdx]=useState(0);
  const [step,setStep]=useState("info");
  const [saving,setSaving]=useState(false);
  const scoredCount=Object.values(scores).filter(v=>v!==null).length;

  const save = async () => {
    if(!form.title.trim()) return;
    setSaving(true);
    await sb.post(token,"sessions",{ player_id: player.id, club_id: CLUB_ID, recorded_by_coach_id: coachId, primary_coach_id: player.primary_coach_id, title: form.title.trim(), content: form.content.trim(), date: form.date, is_formal: isFormal, scores: scores });
    setSaving(false);
    onBack(true);
  };

  if(step==="info") return(
    <div style={{padding:"16px 16px 90px"}}>
      <BackBtn label={player.name} onClick={onBack}/>
      <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:4}}>{isFormal?"📊 Evaluación Formal":"📋 Nueva Sesión"}</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>{isFormal?"Califica todos los skills":"Califica solo lo que entrenaron hoy, el resto en N/A"}</div>
      <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={inp}/>
      <input placeholder={isFormal?"Evaluación formal":"Título (ej: Volea + bajada de pared)"} value={form.title} onChange={e=>setForm({...form,title:e.target.value})} style={inp}/>
      <textarea placeholder="Notas generales (opcional)..." value={form.content} onChange={e=>setForm({...form,content:e.target.value})} rows={3} style={{...inp,resize:"none"}}/>
      <button onClick={()=>{if(form.title.trim())setStep("skills");}} style={btnP}>Calificar skills →</button>
    </div>
  );

  const cat=SKILL_CATEGORIES[catIdx];
  const isLast=catIdx===SKILL_CATEGORIES.length-1;
  return(
    <div>
      <div style={{background:C.surface,padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
        <BackBtn label="Info" onClick={()=>setStep("info")}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{form.title}</div>
          <div style={{fontSize:11,color:C.accent,fontWeight:700}}>{catIdx+1}/{SKILL_CATEGORIES.length}</div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:11,color:C.muted}}>{scoredCount} skills calificados</span>
          {isFormal&&<Badge label="Evaluación formal" color={C.accent}/>}
        </div>
        <div style={{height:4,borderRadius:2,background:C.border}}>
          <div style={{height:"100%",width:`${((catIdx+1)/SKILL_CATEGORIES.length)*100}%`,borderRadius:2,background:isFormal?C.accent:C.blue,transition:"width 0.3s"}}/>
        </div>
      </div>
      <div style={{padding:"16px 16px 100px"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><RadarChart scores={scores} size={200} catId={cat.id}/></div>
        <div style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:cat.color,marginBottom:16,textTransform:"uppercase",letterSpacing:"0.06em"}}>{cat.label}</div>
          {cat.skills.map(skill=><ScoreInput key={skill.id} skill={skill} value={scores[skill.id]} onChange={(id,v)=>setScores(p=>({...p,[id]:v}))}/>)}
        </div>
        <div style={{display:"flex",gap:8}}>
          {catIdx>0&&<button onClick={()=>setCatIdx(i=>i-1)} style={{...btnS,flex:1}}>← Anterior</button>}
          {!isLast?<button onClick={()=>setCatIdx(i=>i+1)} style={{...btnP,flex:1}}>Siguiente →</button>
                  :<button onClick={save} disabled={saving} style={{...btnP,flex:1,background:C.success,opacity:saving?0.7:1}}>{saving?"Guardando...":"✅ Guardar"}</button>}
        </div>
      </div>
    </div>
  );
}

// ── LEVEL CARD ────────────────────────────────────────────────────────────────
function LevelCard({currentScores,thresholds,playerLevel}) {
  const calc=useMemo(()=>computeLevel(currentScores,thresholds),[currentScores,thresholds]);
  const lc=levelColor(calc.level);
  const nextLc=calc.nextLevel?levelColor(calc.nextLevel):null;
  return(
    <div style={{background:C.card,borderRadius:14,padding:16,border:`1px solid ${lc}44`,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>NIVEL CALCULADO</div>
          <div style={{fontSize:22,fontWeight:800,color:lc}}>{calc.level}</div>
        </div>
        {calc.nextLevel&&<div style={{textAlign:"right"}}><div style={{fontSize:10,color:C.muted,marginBottom:2}}>Hacia {calc.nextLevel}</div><div style={{fontSize:20,fontWeight:800,color:nextLc}}>{calc.pctToNext}%</div></div>}
      </div>
      {calc.nextLevel&&(
        <>
          <div style={{height:6,borderRadius:3,background:C.border,marginBottom:12}}>
            <div style={{height:"100%",width:`${calc.pctToNext}%`,borderRadius:3,background:`linear-gradient(90deg,${lc},${nextLc})`,transition:"width 0.5s"}}/>
          </div>
          {calc.missing.length>0&&(
            <div>
              <div style={{fontSize:10,color:C.muted,fontWeight:600,marginBottom:8}}>SKILLS POR MEJORAR</div>
              {calc.missing.slice(0,5).map(s=>(
                <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:12,color:C.text}}>{s.label}</span>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:scColor(s.current),fontWeight:700}}>{s.current}</span>
                    <span style={{fontSize:10,color:C.muted}}>→</span>
                    <span style={{fontSize:11,color:nextLc,fontWeight:700}}>{s.needed}</span>
                    <span style={{fontSize:10,color:C.danger,fontWeight:700}}>(-{s.gap})</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
      {calc.level==="Avanzado"&&<div style={{fontSize:13,color:C.accent,fontWeight:700,textAlign:"center"}}>🏆 Nivel máximo alcanzado</div>}
    </div>
  );
}

// ── COMPARE SESSIONS ──────────────────────────────────────────────────────────
function CompareSessions({sessions,onBack}) {
  const [selA,setSelA]=useState(null);
  const [selB,setSelB]=useState(null);
  const scored=sessions.filter(s=>s.scores&&Object.values(s.scores).some(v=>v!==null));

  if(!selA||!selB) return(
    <div style={{padding:"16px 16px 90px"}}>
      <BackBtn label="Sesiones" onClick={onBack}/>
      <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:4}}>Comparar Sesiones</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Selecciona dos sesiones para comparar</div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <div style={{flex:1,background:selA?C.accent+"22":C.card,borderRadius:10,padding:"8px 10px",border:`1px solid ${selA?C.accent:C.border}`,textAlign:"center"}}>
          <div style={{fontSize:9,color:selA?C.accent:C.muted,fontWeight:700,marginBottom:2}}>SESIÓN A</div>
          <div style={{fontSize:11,color:C.text,fontWeight:600}}>{selA?selA.title.slice(0,20):"Sin seleccionar"}</div>
        </div>
        <div style={{flex:1,background:selB?C.blue+"22":C.card,borderRadius:10,padding:"8px 10px",border:`1px solid ${selB?C.blue:C.border}`,textAlign:"center"}}>
          <div style={{fontSize:9,color:selB?C.blue:C.muted,fontWeight:700,marginBottom:2}}>SESIÓN B</div>
          <div style={{fontSize:11,color:C.text,fontWeight:600}}>{selB?selB.title.slice(0,20):"Sin seleccionar"}</div>
        </div>
      </div>
      {scored.map(s=>{
        const isA=selA?.id===s.id,isB=selB?.id===s.id;
        const avg=avgScored(s.scores||{});
        return(
          <div key={s.id} onClick={()=>{if(isA)setSelA(null);else if(isB)setSelB(null);else if(!selA)setSelA(s);else if(!selB)setSelB(s);}} style={{background:isA?C.accent+"22":isB?C.blue+"22":C.card,borderRadius:12,padding:12,border:`1px solid ${isA?C.accent:isB?C.blue:C.border}`,marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{s.title}</div><div style={{fontSize:11,color:C.muted}}>{fmtDate(s.date)}{s.is_formal&&" · Formal"}</div></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {avg&&<span style={{fontSize:16,fontWeight:800,color:C.accent}}>{avg}</span>}
              {isA&&<Badge label="A" color={C.accent}/>}
              {isB&&<Badge label="B" color={C.blue}/>}
            </div>
          </div>
        );
      })}
    </div>
  );

  const scA=selA.scores||{},scB=selB.scores||{};
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.surface,padding:"16px 16px 12px",borderBottom:`1px solid ${C.border}`}}>
        <BackBtn label="Seleccionar" onClick={()=>{setSelA(null);setSelB(null);}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:8}}>Comparación</div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1,background:C.accent+"22",borderRadius:8,padding:"6px 10px",border:`1px solid ${C.accent}44`}}>
            <div style={{fontSize:9,color:C.accent,fontWeight:700}}>A · {fmtShort(selA.date)}</div>
            <div style={{fontSize:11,color:C.text,fontWeight:600}}>{selA.title.slice(0,22)}</div>
            <div style={{fontSize:12,fontWeight:800,color:C.accent}}>{avgScored(scA)??"—"}</div>
          </div>
          <div style={{flex:1,background:C.blue+"22",borderRadius:8,padding:"6px 10px",border:`1px solid ${C.blue}44`}}>
            <div style={{fontSize:9,color:C.blue,fontWeight:700}}>B · {fmtShort(selB.date)}</div>
            <div style={{fontSize:11,color:C.text,fontWeight:600}}>{selB.title.slice(0,22)}</div>
            <div style={{fontSize:12,fontWeight:800,color:C.blue}}>{avgScored(scB)??"—"}</div>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 16px 90px"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><RadarChart scores={scA} compareScores={scB} size={270}/></div>
        {SKILL_CATEGORIES.map(cat=>{
          const catSkills=cat.skills.filter(s=>scA[s.id]!==null&&scA[s.id]!==undefined||scB[s.id]!==null&&scB[s.id]!==undefined);
          if(!catSkills.length) return null;
          return(
            <div key={cat.id} style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:700,color:cat.color,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>{cat.label}</div>
              {catSkills.map(s=>{
                const vA=scA[s.id]??null,vB=scB[s.id]??null;
                const diff=vA!==null&&vB!==null?vA-vB:null;
                return(
                  <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,background:C.card,borderRadius:10,padding:"8px 12px"}}>
                    <span style={{flex:1,fontSize:12,color:C.text,fontWeight:500}}>{s.label}</span>
                    <span style={{fontSize:14,fontWeight:800,color:vA!==null?scColor(vA):C.muted,minWidth:24,textAlign:"center"}}>{vA!==null?vA:"—"}</span>
                    <span style={{fontSize:10,color:C.muted}}>vs</span>
                    <span style={{fontSize:14,fontWeight:800,color:vB!==null?scColor(vB):C.muted,minWidth:24,textAlign:"center"}}>{vB!==null?vB:"—"}</span>
                    {diff!==null&&<span style={{fontSize:11,fontWeight:700,color:diff>0?C.success:diff<0?C.danger:C.muted,minWidth:28,textAlign:"right"}}>{diff>0?`+${diff}`:diff}</span>}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const canEdit = isOwner||coachRole==="admin";
  const isInactive = player.inactive===true;

    setEditSaving(true);
    await sb.patch(token,"players",player.id,{ name:editForm.name.trim(), phone:editForm.phone.trim()||null, email:editForm.email.trim()||null, level:editForm.fuerza, gender:editForm.gender, birthdate:editForm.birthdate||null, notes:editForm.notes.trim()||null });

  };

  const showToast = (msg,type="success") => { setToast({msg,type}); setTimeout(()=>setToast(""),2500); };

  const loadData = useCallback(async()=>{
    setLoading(true);
    const [sess,nts,chs,subs] = await Promise.all([
      sb.get(token,"sessions",`?player_id=eq.${player.id}&order=date.desc`),
      sb.get(token,"player_notes",`?player_id=eq.${player.id}&order=created_at.desc`),
      sb.get(token,"coaches",`?club_id=eq.${CLUB_ID}&select=id,name`),
      sb.get(token,"substitutions",`?player_id=eq.${player.id}&order=session_date.asc`),
    ]);
    setSessions(Array.isArray(sess)?sess:[]);
    setNotes(Array.isArray(nts)?nts:[]);
    setCoaches(Array.isArray(chs)?chs:[]);
    setSubstitutions(Array.isArray(subs)?subs:[]);
    setLoading(false);
  },[player.id,token]);

  useEffect(()=>{loadData();},[loadData]);

  const currentScores=useMemo(()=>computeCurrentScores(sessions),[sessions]);

  const addNote = async(shared=false)=>{
    if(!note.trim()) return;
    await sb.post(token,"player_notes",{player_id:player.id,coach_id:coachId,text:note.trim(),source:"coach",shared});
    setNote("");loadData();showToast(shared?"Nota compartida":"Nota privada guardada");
  };
  const deleteNote = async(id)=>{ await sb.delete(token,"player_notes",id); loadData();setConfirm(null);showToast("Nota eliminada"); };
  const deleteSession = async(id)=>{ await sb.delete(token,"sessions",id); loadData();setConfirm(null);setView("profile");showToast("Sesión eliminada"); };
  const toggleActive = async()=>{ const nowInactive=!isInactive; await sb.patch(token,"players",player.id,{inactive:nowInactive,inactive_since:nowInactive?new Date().toISOString():null}); setConfirm(null);showToast(nowInactive?"Alumno marcado como inactivo":"Alumno reactivado"); onBack(true); };
  const deletePlayer = async()=>{ await sb.delete(token,"players",player.id); setConfirm(null);onBack(true); };

  if(view==="newSession") return <SessionForm player={player} token={token} coachId={coachId} onBack={(refresh)=>{setView("profile");if(refresh){loadData();showToast("Sesión guardada");}}} isFormal={false}/>;
  if(view==="newEval")    return <SessionForm player={player} token={token} coachId={coachId} onBack={(refresh)=>{setView("profile");if(refresh){loadData();showToast("Evaluación guardada");}}} isFormal={true}/>;
  if(view==="compare")    return <CompareSessions sessions={sessions} onBack={()=>setView("profile")}/>;
  if(view==="substitution") return <SubstitutionForm player={player} token={token} coachId={coachId} onBack={()=>setView("profile")} onSaved={()=>{setView("profile");loadData();showToast("✅ Sustitución asignada");}}/>;

  if(view==="sessionDetail"&&selectedSession){
    const sc=selectedSession.scores||{};
    const avg=avgScored(sc);
    const recordedBy=coaches.find(c=>c.id===selectedSession.recorded_by_coach_id);
    return(
      <div style={{minHeight:"100vh",background:C.bg}}>
        {confirm&&<ConfirmDialog {...confirm} onCancel={()=>setConfirm(null)}/>}
        <div style={{background:C.surface,padding:"16px 16px 12px",borderBottom:`1px solid ${C.border}`}}>
          <BackBtn label="Sesiones" onClick={()=>setView("profile")}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>{selectedSession.title}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:12,color:C.muted}}>{fmtDate(selectedSession.date)}</span>
                {selectedSession.is_formal&&<Badge label="Eval. formal" color={C.accent}/>}
                {avg&&<Badge label={`Prom. ${avg}`} color={C.blue}/>}
              </div>
              {recordedBy&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>Registrado por: {recordedBy.name}</div>}
            </div>
            {canEdit&&<button onClick={()=>setConfirm({title:"¿Eliminar sesión?",message:`"${selectedSession.title}" se eliminará permanentemente.`,onConfirm:()=>deleteSession(selectedSession.id)})} style={btnD}>🗑</button>}
          </div>
        </div>
        <div style={{padding:"16px 16px 90px"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><RadarChart scores={sc} size={260}/></div>
          {selectedSession.content&&<div style={{background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.border}`,marginBottom:16}}><div style={{fontSize:11,color:C.muted,marginBottom:4,fontWeight:600}}>NOTAS</div><div style={{fontSize:13,color:C.text,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{selectedSession.content}</div></div>}
          {SKILL_CATEGORIES.map(cat=>{
            const catSkills=cat.skills.filter(s=>sc[s.id]!==null&&sc[s.id]!==undefined);
            if(!catSkills.length) return null;
            return(<div key={cat.id} style={{marginBottom:20}}><div style={{fontSize:11,fontWeight:700,color:cat.color,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>{cat.label}</div>{catSkills.map(skill=><ScoreDisplay key={skill.id} skill={skill} value={sc[skill.id]}/>)}</div>);
          })}
        </div>
      </div>
    );
  }

  const calcLevel=computeLevel(currentScores,thresholds);

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {toast.msg&&<Toast msg={toast.msg} type={toast.type}/>}
      {confirm&&<ConfirmDialog {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div style={{background:C.surface,padding:"16px 16px 0",borderBottom:`1px solid ${C.border}`}}>
        <BackBtn label="Alumnos" onClick={()=>onBack(false)}/>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <Avatar name={player.name} size={52} inactive={isInactive}/>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              <div style={{fontSize:20,fontWeight:800,color:isInactive?C.muted:C.text}}>{player.name}</div>
              {isInactive&&<Badge label="Inactivo" color={C.muted}/>}
              {!isOwner&&<Badge label="Cobertura" color={C.purple}/>}
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <Badge label={player.level||"5ta Fuerza"} color={levelColor(player.level)}/>
              {player.gender&&<Badge label={player.gender} color={C.muted}/>}
              {(()=>{const sc=calcSubcat(player.birthdate);return sc?<Badge label={sc} color={C.warning}/>:null;})()}
              <Badge label={`${sessions.length} sesiones`} color={C.muted}/>
              <Badge label={`${sessions.filter(s=>s.is_formal).length} evals`} color={C.muted}/>
            </div>
            {player.phone&&<div style={{fontSize:10,color:C.muted,marginTop:3}}>📱 {player.phone}</div>}
          </div>
        </div>
        {canEdit&&!isInactive&&(
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setView("newSession")} style={{flex:1,padding:"9px 0",borderRadius:10,background:C.blue,color:"#fff",border:"none",fontWeight:800,fontSize:12,cursor:"pointer"}}>📋 Sesión</button>
            <button onClick={()=>setView("newEval")} style={{flex:1,padding:"9px 0",borderRadius:10,background:C.accent,color:C.bg,border:"none",fontWeight:800,fontSize:12,cursor:"pointer"}}>📊 Eval. formal</button>
            <button onClick={()=>setView("compare")} style={{flex:1,padding:"9px 0",borderRadius:10,background:C.purple+"33",color:C.purple,border:`1px solid ${C.purple}44`,fontWeight:800,fontSize:12,cursor:"pointer"}}>⚖️</button>
            {isOwner&&<button onClick={()=>setView("substitution")} style={{flex:1,padding:"9px 0",borderRadius:10,background:C.warning+"22",color:C.warning,border:`1px solid ${C.warning}44`,fontWeight:800,fontSize:12,cursor:"pointer"}}>📅 Sub</button>}
          </div>
        )}
        <div style={{display:"flex"}}>
          {[["overview","🎯"],["level","🏅"],["heatmap","🌡️"],["sessions","📋"],["notas","📝"],["cfg","⚙️"]].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)} style={{flex:1,padding:"8px 2px",background:"none",border:"none",borderBottom:`2px solid ${activeTab===id?C.accent:"transparent"}`,color:activeTab===id?C.accent:C.muted,cursor:"pointer",fontSize:16}}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 16px 90px"}}>
        {loading&&<Spinner/>}
        {!loading&&(
          <>
            {activeTab==="overview"&&(
              <div>
                <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><RadarChart scores={currentScores} size={290}/></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  {SKILL_CATEGORIES.map(cat=>{const avg=avgCatScored(currentScores,cat.id);return(
                    <div key={cat.id} style={{background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:10,color:cat.color,fontWeight:700,marginBottom:2}}>{cat.label}</div>
                      <div style={{fontSize:26,fontWeight:800,color:avg?C.text:C.muted}}>{avg??"—"}</div>
                      <div style={{fontSize:9,color:C.muted}}>{avg?"/ 10":"sin datos"}</div>
                    </div>
                  );})}
                </div>
                <AIRecommendations
                  player={player}
                  sessions={sessions}
                  notes={notes}
                  thresholds={thresholds}
                  currentScores={currentScores}
                  token={token}
                  isPlayerView={false}
                />
              </div>
            )}

            {activeTab==="level"&&(
              <div>
                <LevelCard currentScores={currentScores} thresholds={thresholds} playerLevel={player.level}/>
                {(()=>{
                  const formals=sessions.filter(s=>s.is_formal).sort((a,b)=>new Date(a.date)-new Date(b.date));
                  if(formals.length<2) return <div style={{textAlign:"center",padding:20,color:C.muted,fontSize:12}}>Necesitas al menos 2 evaluaciones formales para ver el progreso.</div>;
                  const first=avgScored(formals[0].scores||{}),last=avgScored(formals[formals.length-1].scores||{});
                  return(
                    <div style={{background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:600}}>PROGRESO (evals. formales)</div>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{textAlign:"center"}}><div style={{fontSize:11,color:C.muted}}>Primera</div><div style={{fontSize:20,fontWeight:800,color:C.text}}>{first}</div><div style={{fontSize:9,color:C.muted}}>{fmtShort(formals[0].date)}</div></div>
                        <div style={{flex:1,height:2,background:`linear-gradient(90deg,${C.muted},${C.accent})`,borderRadius:1}}/>
                        <div style={{textAlign:"center"}}><div style={{fontSize:11,color:C.muted}}>Actual</div><div style={{fontSize:20,fontWeight:800,color:C.accent}}>{last}</div><div style={{fontSize:9,color:C.muted}}>{fmtShort(formals[formals.length-1].date)}</div></div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

            {activeTab==="heatmap"&&<HeatMap sessions={sessions}/>}

            {activeTab==="sessions"&&(
              <div>
                {substitutions.filter(s=>s.status==="pending").length>0&&(
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.warning,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>📅 Sustituciones pendientes</div>
                    {substitutions.filter(s=>s.status==="pending").map(sub=>{
                      const subCoach=coaches.find(c=>c.id===sub.assigned_coach_id);
                      const isPast=new Date(sub.session_date+"T23:59:59")<new Date();
                      return(
                        <div key={sub.id} style={{background:C.warning+"11",borderRadius:12,padding:12,border:`1px solid ${C.warning}44`,marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div>
                              <div style={{fontSize:13,fontWeight:700,color:C.warning,marginBottom:3}}>{fmtDate(sub.session_date)} {isPast&&"· ⚠️ Pasada"}</div>
                              <div style={{fontSize:11,color:C.muted}}>Sustituto: <strong style={{color:C.text}}>{subCoach?.name||"—"}</strong></div>
                              {sub.notes&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>"{sub.notes}"</div>}
                            </div>
                            {(isOwner||coachRole==="admin")&&(
                              <button onClick={()=>setConfirm({title:"¿Cancelar sustitución?",message:`Sustitución del ${fmtDate(sub.session_date)} con ${subCoach?.name} se eliminará.`,confirmLabel:"Cancelar sub",danger:true,onConfirm:async()=>{await sb.delete(token,"substitutions",sub.id);loadData();setConfirm(null);showToast("Sustitución cancelada");}})} style={{background:C.danger+"22",color:C.danger,border:`1px solid ${C.danger}44`,borderRadius:8,padding:"5px 10px",fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0}}>✕</button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {sessions.length===0&&substitutions.filter(s=>s.status==="pending").length===0&&<div style={{textAlign:"center",padding:40,color:C.muted}}><div style={{fontSize:36,marginBottom:8}}>📋</div><div>Sin sesiones aún</div></div>}
                {sessions.map(s=>{
                  const sc=s.scores||{};
                  const avg=avgScored(sc);
                  const scored=Object.values(sc).filter(v=>v!==null).length;
                  const recordedBy=coaches.find(c=>c.id===s.recorded_by_coach_id);
                  return(
                    <div key={s.id} onClick={()=>{setSelectedSession(s);setView("sessionDetail");}} style={{background:C.card,borderRadius:14,padding:14,border:`1px solid ${s.is_formal?C.accent+"44":C.border}`,marginBottom:10,cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>{s.title}</div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontSize:11,color:C.muted}}>{fmtDate(s.date)}</span>
                            {s.is_formal&&<Badge label="Eval. formal" color={C.accent}/>}
                            {recordedBy&&recordedBy.id!==player.primary_coach_id&&<Badge label={`Por: ${recordedBy.name}`} color={C.purple}/>}
                          </div>
                        </div>
                        {avg&&<div style={{textAlign:"right",flexShrink:0,marginLeft:8}}><div style={{fontSize:20,fontWeight:800,color:C.accent}}>{avg}</div><div style={{fontSize:9,color:C.muted}}>prom.</div></div>}
                      </div>
                      <div style={{fontSize:11,color:C.muted}}>{scored} skills calificados</div>
                    </div>
                  );
                })}
              </div>
            )}

            {activeTab==="notas"&&(
              <div>
                {editingNote&&<NoteEditModal note={editingNote} onCancel={()=>setEditingNote(null)} onSave={async(text)=>{await sb.patch(token,"player_notes",editingNote.id,{text});setEditingNote(null);loadData();showToast("Nota actualizada");}}/>}
                <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>🔒 Notas de Coach (privadas)</div>
                {canEdit&&(
                  <div style={{background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.border}`,marginBottom:12}}>
                    <textarea placeholder="Observación interna, táctica, recordatorio..." value={note} onChange={e=>setNote(e.target.value)} rows={3} style={{...inp,resize:"none",marginBottom:8}}/>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>addNote(false)} style={{...btnS,flex:1,fontSize:12}}>🔒 Guardar privada</button>
                      <button onClick={()=>addNote(true)} style={{...btnP,flex:1,fontSize:12,background:C.blue}}>📤 Guardar y compartir</button>
                    </div>
                  </div>
                )}
                {notes.filter(n=>n.source==="coach"&&!n.shared).length===0&&<div style={{textAlign:"center",padding:"12px 0 20px",color:C.muted,fontSize:12}}>Sin notas privadas aún</div>}
                {notes.filter(n=>n.source==="coach"&&!n.shared).map(n=>{
                  const author=coaches.find(c=>c.id===n.coach_id);
                  const isOwn=n.coach_id===coachId;
                  const canEditNote=isOwn||coachRole==="admin";
                  return(
                    <div key={n.id} style={{background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.border}`,marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                        <div style={{fontSize:13,color:C.text,lineHeight:1.5,flex:1}}>{n.text}</div>
                        <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                          <button onClick={async()=>{await sb.patch(token,"player_notes",n.id,{shared:true});loadData();showToast("Nota compartida con alumno");}} style={{background:C.blue+"22",color:C.blue,border:`1px solid ${C.blue}44`,borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>📤</button>
                          {canEditNote&&<button onClick={()=>setEditingNote(n)} style={{background:C.warning+"22",color:C.warning,border:`1px solid ${C.warning}44`,borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>✏️</button>}
                          {canEditNote&&<button onClick={()=>setConfirm({title:"¿Eliminar nota?",message:"Se eliminará permanentemente.",onConfirm:()=>deleteNote(n.id)})} style={{...btnD,padding:"4px 8px"}}>🗑</button>}
                        </div>
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:6}}>{fmtDate(n.created_at)}{author?` · ${author.name}`:""}</div>
                    </div>
                  );
                })}
                <div style={{fontSize:11,fontWeight:700,color:C.blue,marginTop:16,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>📤 Notas compartidas con el alumno</div>
                {notes.filter(n=>n.source==="coach"&&n.shared).length===0&&<div style={{textAlign:"center",padding:"12px 0 20px",color:C.muted,fontSize:12}}>Sin notas compartidas aún</div>}
                {notes.filter(n=>n.source==="coach"&&n.shared).map(n=>{
                  const author=coaches.find(c=>c.id===n.coach_id);
                  const isOwn=n.coach_id===coachId;
                  const canEditNote=isOwn||coachRole==="admin";
                  return(
                    <div key={n.id} style={{background:C.blue+"11",borderRadius:12,padding:12,border:`1px solid ${C.blue}44`,marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                        <div style={{fontSize:13,color:C.text,lineHeight:1.5,flex:1}}>{n.text}</div>
                        <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                          <button onClick={async()=>{await sb.patch(token,"player_notes",n.id,{shared:false});loadData();showToast("Nota movida a privadas");}} style={{background:C.muted+"22",color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>🔒</button>
                          {canEditNote&&<button onClick={()=>setEditingNote(n)} style={{background:C.warning+"22",color:C.warning,border:`1px solid ${C.warning}44`,borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>✏️</button>}
                          {canEditNote&&<button onClick={()=>setConfirm({title:"¿Eliminar nota?",message:"Se eliminará permanentemente.",onConfirm:()=>deleteNote(n.id)})} style={{...btnD,padding:"4px 8px"}}>🗑</button>}
                        </div>
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:6}}>{fmtDate(n.created_at)}{author?` · ${author.name}`:""}</div>
                    </div>
                  );
                })}
                <div style={{fontSize:11,fontWeight:700,color:C.accent,marginTop:20,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>🎾 Notas del alumno</div>
                {notes.filter(n=>n.source==="player").length===0&&<div style={{textAlign:"center",padding:"12px 0 20px",color:C.muted,fontSize:12}}>El alumno no ha escrito notas aún</div>}
                {notes.filter(n=>n.source==="player").map(n=>(
                  <div key={n.id} style={{background:C.accent+"11",borderRadius:12,padding:12,border:`1px solid ${C.accent}33`,marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                      <div style={{fontSize:13,color:C.text,lineHeight:1.5,flex:1}}>{n.text}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                        {coachRole==="admin"&&<button onClick={()=>setEditingNote(n)} style={{background:C.warning+"22",color:C.warning,border:`1px solid ${C.warning}44`,borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>✏️</button>}
                        <button onClick={()=>setConfirm({title:"¿Eliminar nota del alumno?",message:"Se eliminará permanentemente.",onConfirm:()=>deleteNote(n.id)})} style={{...btnD,padding:"4px 8px"}}>🗑</button>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:C.muted,marginTop:6}}>{fmtDate(n.created_at)}</div>
                  </div>
                ))}
              </div>
            )}

            {activeTab==="cfg"&&canEdit&&(
              <div>
                <div style={{background:C.card,borderRadius:14,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Editar alumno</div>
                  <input placeholder="Nombre completo *" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} style={inp}/>
                  <input placeholder="Celular (opcional)" value={editForm.phone} onChange={e=>setEditForm({...editForm,phone:e.target.value})} type="tel" style={inp}/>
                  <input placeholder="Email (opcional)" value={editForm.email} onChange={e=>setEditForm({...editForm,email:e.target.value})} type="email" style={inp}/>
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>CATEGORÍA</div>
                    <select value={editForm.fuerza} onChange={e=>setEditForm({...editForm,fuerza:e.target.value})} style={inp}>{FUERZAS.map(f=><option key={f}>{f}</option>)}</select>
                  </div>
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>GÉNERO</div>
                    <div style={{display:"flex",gap:8,marginBottom:10}}>
                      {GENEROS.map(g=>(<button key={g} onClick={()=>setEditForm({...editForm,gender:g})} style={{flex:1,padding:"9px",borderRadius:10,border:`1px solid ${editForm.gender===g?C.accent:C.border}`,background:editForm.gender===g?C.accent+"22":C.bg,color:editForm.gender===g?C.accent:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>{g}</button>))}
                    </div>
                  </div>

// ── PLAYERS TAB ───────────────────────────────────────────────────────────────
function PlayersTab({token,coachId,coachRole,thresholds,onSelectPlayer}) {
  const [players,setPlayers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState("");
  const [filterLevel,setFilterLevel]=useState("Todos");
  const [showInactive,setShowInactive]=useState(false);
  const [form,setForm]=useState({name:"",phone:"",email:"",fuerza:"5ta Fuerza",gender:"Varonil",birthdate:"",notes:"",assignedCoachId:""});
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState("");
  const [coaches,setCoaches]=useState([]);
  const [lastCreated,setLastCreated]=useState(null);
  const [subPlayerIds,setSubPlayerIds]=useState(new Set());

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(""),2500);};

  const loadPlayers = useCallback(async()=>{
    setLoading(true);
    const cutoff = new Date(Date.now()+48*3600000).toISOString().slice(0,10);
    const [data,chs,subs] = await Promise.all([
      sb.get(token,"players",`?club_id=eq.${CLUB_ID}&order=name.asc`),
      sb.get(token,"coaches",`?club_id=eq.${CLUB_ID}&inactive=eq.false&select=id,name,role&order=name.asc`),
      sb.get(token,"substitutions",`?assigned_coach_id=eq.${coachId}&status=eq.pending&session_date=lte.${cutoff}&select=player_id,session_date`),
    ]);
    setPlayers(Array.isArray(data)?data:[]);
    const coachesList = Array.isArray(chs)?chs:[];
    setCoaches(coachesList);
    if(coachesList.length && !form.assignedCoachId){
    setForm(f=>({...f,assignedCoachId:coachesList[0].id}));
}
setSubPlayerIds(new Set((Array.isArray(subs)?subs:[]).map(s=>s.player_id)));

    setLoading(false);
  },[token,coachId]);

  useEffect(()=>{loadPlayers();},[loadPlayers]);

  const filtered=useMemo(()=>players.filter(p=>{
    if(!showInactive&&p.inactive) return false;
    if(showInactive&&!p.inactive) return false;
    const matchSearch=p.name.toLowerCase().includes(search.toLowerCase());
    const matchLevel=filterLevel==="Todos"||p.level===filterLevel;
    if(!matchSearch||!matchLevel) return false;
    if(coachRole==="admin") return true;
    const isOwn=p.primary_coach_id===coachId;
    const isSub=subPlayerIds.has(p.id)&&!isOwn;
    return isOwn||isSub;
  }),[players,search,filterLevel,showInactive,subPlayerIds,coachId,coachRole]);

  const activeCount=players.filter(p=>!p.inactive).length;
  const inactiveCount=players.filter(p=>p.inactive).length;

  const addPlayer=async()=>{
  alert(`name:${form.name} | coachId:${form.assignedCoachId} | coaches:${coaches.length}`);
    if(!form.name.trim()){showToast("El nombre es obligatorio","error");return;}
    const finalCoachId = form.assignedCoachId || (coaches.length ? coaches[0].id : "");
    if(!finalCoachId){showToast("Asigna un coach al alumno","error");return;}
    setSaving(true);
    const inviteCode=generateCode();
    const pin=String(Math.floor(1000+Math.random()*9000));
    const insertResult = await sb.post(token,"players",{ club_id:CLUB_ID, primary_coach_id:form.assignedCoachId, name:form.name.trim(), phone:form.phone.trim()||null, email:form.email.trim()||null, level:form.fuerza, gender:form.gender, birthdate:form.birthdate||null, notes:form.notes.trim()||null, invite_code:inviteCode, invite_pin:pin, inactive:false });
    alert("INSERT result: " + JSON.stringify(insertResult));
    setSaving(false);
    setLastCreated({name:form.name.trim(),code:inviteCode,pin});
    setForm({name:"",phone:"",email:"",fuerza:"5ta Fuerza",gender:"Varonil",birthdate:"",notes:"",assignedCoachId:""});
    setShowAdd(false);
    loadPlayers();
  };

  return(
    <div style={{padding:"16px 16px 90px"}}>
      {toast.msg&&<Toast msg={toast.msg} type={toast.type}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div><div style={{fontSize:22,fontWeight:800,color:C.text}}>Alumnos</div><div style={{fontSize:12,color:C.muted}}>{activeCount} activos{inactiveCount>0?` · ${inactiveCount} inactivos`:""}</div></div>
        {coachRole==="admin"&&<button onClick={()=>setShowAdd(true)} style={{background:C.accent,color:C.bg,border:"none",borderRadius:12,padding:"8px 16px",fontWeight:800,fontSize:13,cursor:"pointer"}}>+ Nuevo</button>}
      </div>
      <div style={{position:"relative",marginBottom:10}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.muted}}>🔍</span>
        <input placeholder="Buscar alumno..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,marginBottom:0,paddingLeft:36}}/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
        {["Todos",...FUERZAS].map(lvl=>(<button key={lvl} onClick={()=>setFilterLevel(lvl)} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap",background:filterLevel===lvl?C.accent:C.card,color:filterLevel===lvl?C.bg:C.muted}}>{lvl}</button>))}
        {inactiveCount>0&&<button onClick={()=>setShowInactive(v=>!v)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${C.muted}44`,cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap",background:showInactive?C.muted:C.card,color:showInactive?C.bg:C.muted}}>{showInactive?"← Activos":`Inactivos (${inactiveCount})`}</button>}
      </div>
      {lastCreated&&(
        <div style={{background:C.success+"22",borderRadius:16,padding:16,border:`1px solid ${C.success}44`,marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:700,color:C.success,marginBottom:8}}>✅ Alumno creado</div>
          <div style={{fontSize:13,color:C.text,marginBottom:12}}>Comparte estos datos con <strong>{lastCreated.name}</strong> por WhatsApp:</div>
          <div style={{background:C.bg,borderRadius:10,padding:"12px 16px",marginBottom:10,border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:11,color:C.muted}}>Código de acceso</span><span style={{fontSize:20,fontWeight:800,color:C.accent,letterSpacing:"0.1em"}}>{lastCreated.code}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.muted}}>PIN temporal</span><span style={{fontSize:20,fontWeight:800,color:C.blue,letterSpacing:"0.1em"}}>{lastCreated.pin}</span></div>
          </div>
          <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.5}}>El alumno abre PádelCoach → "Soy alumno" → ingresa código + PIN → cambia su PIN</div>
          <button onClick={()=>setLastCreated(null)} style={btnS}>Entendido</button>
        </div>
      )}
      {showAdd&&(
        <div style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:700,color:C.accent,marginBottom:12}}>Nuevo Alumno</div>
          <input placeholder="Nombre completo *" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={inp}/>
          <input placeholder="Celular (opcional, para WhatsApp)" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} type="tel" style={inp}/>
          <input placeholder="Email (opcional, para login futuro)" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} type="email" style={inp}/>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>CATEGORÍA</div><select value={form.fuerza} onChange={e=>setForm({...form,fuerza:e.target.value})} style={inp}>{FUERZAS.map(f=><option key={f}>{f}</option>)}</select></div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>GÉNERO</div><div style={{display:"flex",gap:8,marginBottom:10}}>{GENEROS.map(g=>(<button key={g} onClick={()=>setForm({...form,gender:g})} style={{flex:1,padding:"9px",borderRadius:10,border:`1px solid ${form.gender===g?C.accent:C.border}`,background:form.gender===g?C.accent+"22":C.bg,color:form.gender===g?C.accent:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>{g}</button>))}</div></div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>FECHA DE NACIMIENTO (opcional)</div><input type="date" value={form.birthdate} onChange={e=>setForm({...form,birthdate:e.target.value})} style={inp}/></div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>COACH ASIGNADO *</div><select value={form.assignedCoachId} onChange={e=>setForm({...form,assignedCoachId:e.target.value})} style={inp}><option value="">— Seleccionar coach —</option>{coaches.map(c=><option key={c.id} value={c.id}>{c.name}{c.role==="admin"?" (Admin)":""}</option>)}</select></div>
          <textarea placeholder="Notas iniciales (opcional)" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2} style={{...inp,resize:"none"}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowAdd(false)} style={{...btnS,flex:1}}>Cancelar</button>
            <button onClick={addPlayer} disabled={saving} style={{...btnP,flex:1,opacity:saving?0.7:1}}>{saving?"Guardando...":"Guardar"}</button>
          </div>
        </div>
      )}
      {loading&&<Spinner/>}
      {!loading&&activeCount===0&&!showInactive&&<div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}><div style={{fontSize:40,marginBottom:12}}>🎾</div><div style={{fontSize:14}}>Aún no tienes alumnos.<br/>¡Agrega el primero!</div></div>}
      {!loading&&filtered.length===0&&players.length>0&&<div style={{textAlign:"center",padding:"30px 20px",color:C.muted}}><div style={{fontSize:32,marginBottom:8}}>🔍</div><div style={{fontSize:13}}>Sin resultados</div></div>}
      {filtered.map(player=>{
        const isOwner=player.primary_coach_id===coachId;
        const isSub=subPlayerIds.has(player.id)&&!isOwner;
        const assignedCoach=coaches.find(c=>c.id===player.primary_coach_id);
        return(
          <div key={player.id} onClick={()=>onSelectPlayer(player)} style={{background:C.card,borderRadius:16,padding:14,border:`1px solid ${isSub?C.warning+"55":player.inactive?C.border+"88":C.border}`,marginBottom:10,cursor:"pointer",opacity:player.inactive?0.65:1}}>

          </div>
        );
      })}
    </div>
  );
}

// ── SESSIONS GLOBAL ───────────────────────────────────────────────────────────
function SessionsTab({token,onGoToPlayer}) {
  const [sessions,setSessions]=useState([]);
  const [players,setPlayers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [filterType,setFilterType]=useState("todas");

  useEffect(()=>{
    Promise.all([
      sb.get(token,"sessions",`?club_id=eq.${CLUB_ID}&order=date.desc&limit=200`),
      sb.get(token,"players",`?club_id=eq.${CLUB_ID}&select=id,name,primary_coach_id`),
    ]).then(([sess,play])=>{ setSessions(Array.isArray(sess)?sess:[]); setPlayers(Array.isArray(play)?play:[]); setLoading(false); });
  },[token]);

  const playerMap=Object.fromEntries(players.map(p=>[p.id,p]));
  const filtered=useMemo(()=>sessions.filter(s=>{
    const player=playerMap[s.player_id];
    const q=search.toLowerCase();
    const matchSearch=s.title.toLowerCase().includes(q)||s.content?.toLowerCase().includes(q)||player?.name.toLowerCase().includes(q);
    const matchType=filterType==="todas"||(filterType==="formales"&&s.is_formal)||(filterType==="sesiones"&&!s.is_formal);
    return matchSearch&&matchType;
  }),[sessions,search,filterType,players]);

  return(
    <div style={{padding:"16px 16px 90px"}}>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:4}}>Sesiones</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{sessions.length} registradas en total</div>
      <div style={{position:"relative",marginBottom:10}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.muted}}>🔍</span>
        <input placeholder="Buscar por alumno, título o contenido..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,marginBottom:0,paddingLeft:36}}/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[["todas","Todas"],["sesiones","Sesiones"],["formales","Evals. formales"]].map(([id,label])=>(<button key={id} onClick={()=>setFilterType(id)} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap",background:filterType===id?C.accent:C.card,color:filterType===id?C.bg:C.muted}}>{label}</button>))}
      </div>
      {loading&&<Spinner/>}
      {!loading&&sessions.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted}}><div style={{fontSize:36,marginBottom:10}}>📋</div><div>Aún no hay sesiones.</div></div>}
      {!loading&&filtered.map(s=>{
        const player=playerMap[s.player_id];
        const avg=s.scores?avgScored(s.scores):null;
        const scored=Object.values(s.scores||{}).filter(v=>v!==null).length;
        return(
          <div key={s.id} onClick={()=>player&&onGoToPlayer(player)} style={{background:C.card,borderRadius:14,padding:14,border:`1px solid ${s.is_formal?C.accent+"44":C.border}`,marginBottom:10,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:3}}>{s.title}</div>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  {player&&<span style={{fontSize:11,color:C.accent,fontWeight:600}}>{player.name}</span>}
                  <span style={{fontSize:11,color:C.muted}}>· {fmtDate(s.date)}</span>
                  {s.is_formal&&<Badge label="Formal" color={C.accent}/>}
                </div>
              </div>
              {avg&&<div style={{textAlign:"right",flexShrink:0,marginLeft:8}}><div style={{fontSize:18,fontWeight:800,color:C.accent}}>{avg}</div><div style={{fontSize:9,color:C.muted}}>prom.</div></div>}
            </div>
            <div style={{fontSize:11,color:C.muted}}>{scored} skills calificados</div>
          </div>
        );
      })}
    </div>
  );
}

// ── CONFIG TAB ────────────────────────────────────────────────────────────────
function ConfigTab({token,coachRole,thresholds,onThresholdsUpdate,coachName,onSignOut}) {
  const [local,setLocal]=useState(()=>JSON.parse(JSON.stringify(thresholds)));
  const [saved,setSaved]=useState(false);
  const [saving,setSaving]=useState(false);

  const update=(skillId,key,val)=>{
    const upper=val.toUpperCase().trim();
    if(upper==="NA"||upper==="N"){ setLocal(prev=>({...prev,[skillId]:{...prev[skillId],[key]:"NA"}})); setSaved(false);return; }
    const n=parseInt(val);
    if(isNaN(n)||n<0||n>10) return;
    setLocal(prev=>({...prev,[skillId]:{...prev[skillId],[key]:String(n)}}));
    setSaved(false);
  };

  const save=async()=>{
    if(coachRole!=="admin"){alert("Solo el admin puede modificar los umbrales");return;}
    setSaving(true);
    const rows=ALL_SKILLS.map(s=>({ club_id:CLUB_ID,skill_id:s.id, quinta:local[s.id]?.quinta??"5",cuarta:local[s.id]?.cuarta??"5",tercera:local[s.id]?.tercera??"5",segunda:local[s.id]?.segunda??"7",primera:local[s.id]?.primera??"8",open:local[s.id]?.open??"9" }));
    await fetch(`${SUPABASE_URL}/rest/v1/thresholds`,{ method:"POST", headers:{...sb.headers(token),"Prefer":"resolution=merge-duplicates"}, body:JSON.stringify(rows) });
    onThresholdsUpdate(local);
    setSaving(false);setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const reset=()=>{setLocal(JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS)));setSaved(false);};

  return(
    <div style={{padding:"16px 16px 90px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <div style={{fontSize:22,fontWeight:800,color:C.text}}>Configuración</div>
        <button onClick={onSignOut} style={{background:C.danger+"22",color:C.danger,border:`1px solid ${C.danger}44`,borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Salir</button>
      </div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Coach: <strong style={{color:C.text}}>{coachName}</strong> · {coachRole==="admin"?"Admin":"Coach"} · Advantage</div>
      {coachRole!=="admin"&&(<div style={{background:C.warning+"22",border:`1px solid ${C.warning}44`,borderRadius:10,padding:"10px 12px",marginBottom:16,fontSize:12,color:C.warning}}>Solo el admin puede modificar los umbrales. Puedes consultarlos como referencia.</div>)}
      <div style={{background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.border}`,marginBottom:16,fontSize:12,color:C.muted,lineHeight:1.6}}>Un alumno sube de nivel cuando <strong style={{color:C.text}}>todos sus skills calificados</strong> alcanzan el umbral mínimo del siguiente nivel.</div>
      <div style={{overflowX:"auto",marginBottom:16}}>
        <div style={{minWidth:560}}>
          <div style={{display:"grid",gridTemplateColumns:"140px repeat(6,1fr)",background:C.surface,padding:"10px 12px",borderRadius:"14px 14px 0 0",border:`1px solid ${C.border}`,borderBottom:"none"}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted}}>SKILL</div>
            {FUERZA_KEYS.map(k=>(<div key={k} style={{fontSize:10,fontWeight:700,color:FUERZA_COLORS[k],textAlign:"center"}}>{FUERZA_LABELS[k]}</div>))}
          </div>
          <div style={{border:`1px solid ${C.border}`,borderRadius:"0 0 14px 14px",overflow:"hidden"}}>
            {SKILL_CATEGORIES.map((cat)=>(
              <div key={cat.id}>
                <div style={{padding:"6px 12px",background:cat.color+"11",borderTop:`1px solid ${C.border}`}}><span style={{fontSize:10,fontWeight:800,color:cat.color,textTransform:"uppercase",letterSpacing:"0.06em"}}>{cat.label}</span></div>
                {cat.skills.map(skill=>(
                  <div key={skill.id} style={{display:"grid",gridTemplateColumns:"140px repeat(6,1fr)",padding:"6px 12px",borderTop:`1px solid ${C.border}22`,alignItems:"center",background:C.card}}>
                    <span style={{fontSize:11,color:C.text}}>{skill.label}</span>
                    {FUERZA_KEYS.map(k=>{
                      const val=local[skill.id]?.[k]??"";
                      const isNA=val==="NA"||val==="na";
                      return(<div key={k} style={{display:"flex",justifyContent:"center"}}><input value={val} onChange={e=>update(skill.id,k,e.target.value)} disabled={coachRole!=="admin"} placeholder="NA" style={{width:38,padding:"3px 0",textAlign:"center",borderRadius:6,background:C.bg,border:`1px solid ${isNA?C.muted+"44":FUERZA_COLORS[k]+"66"}`,color:isNA?C.muted:FUERZA_COLORS[k],fontWeight:700,fontSize:11,outline:"none",opacity:coachRole!=="admin"?0.5:1}}/></div>);
                    })}
                  </div>
                ))}

        </div>
      </div>
      {coachRole==="admin"&&(<div style={{display:"flex",gap:8}}><button onClick={reset} style={{...btnS,flex:1}}>Restablecer</button><button onClick={save} disabled={saving} style={{...btnP,flex:1,background:saved?C.success:C.accent,opacity:saving?0.7:1}}>{saving?"Guardando...":saved?"✅ Guardado":"Guardar cambios"}</button></div>)}
    </div>
  );

// ── AI RECOMMENDATIONS ────────────────────────────────────────────────────────
const CATEGORY_CONTEXT = {
  "5ta Fuerza": "Principiante absoluto. Ejercicios muy simples, un solo concepto a la vez, sin coordinación entre parejas, sin táctica. Movimientos básicos y control de pelota.",
  "4ta Fuerza": "Principiante con base. Ejercicios simples, puede incluir patrones básicos individuales. Sin táctica compleja.",
  "3ra Fuerza": "Intermedio. Pueden incluir patrones simples en pareja, táctica básica de posicionamiento.",
  "2da Fuerza": "Intermedio-avanzado. Ejercicios situacionales simples, táctica de posicionamiento y transición básica.",
  "1ra Fuerza": "Avanzado. Ejercicios complejos, situacionales, tácticos, alta intensidad.",
  "Open": "Elite. Ejercicios de máxima complejidad táctica y técnica."
};

const computeTrends = (sessions) => {
  const ordered = [...sessions].filter(s => s.scores).sort((a,b) => new Date(a.date)-new Date(b.date));
  const trends = {};
  ALL_SKILLS.forEach(skill => {
    const scored = ordered.filter(s => {
      const sc = typeof s.scores === "string" ? JSON.parse(s.scores) : s.scores;
      return sc[skill.id] !== null && sc[skill.id] !== undefined;
    });
    if (scored.length < 2) { trends[skill.id] = "sin_datos"; return; }
    const recent = scored.slice(-3);
    const first = (typeof recent[0].scores === "string" ? JSON.parse(recent[0].scores) : recent[0].scores)[skill.id];
    const last = (typeof recent[recent.length-1].scores === "string" ? JSON.parse(recent[recent.length-1].scores) : recent[recent.length-1].scores)[skill.id];
    const diff = last - first;
    trends[skill.id] = diff > 0.5 ? "subiendo" : diff < -0.5 ? "bajando" : "estancado";
  });
  return trends;
};

const buildAIPrompt = (player, sessions, notes, thresholds, currentScores) => {
  const trends = computeTrends(sessions);
  const category = player.level || "5ta Fuerza";
  const categoryKey = FUERZA_KEYS[FUERZAS.indexOf(category)] || "quinta";
  const catContext = CATEGORY_CONTEXT[category] || "";

  const skillSummary = ALL_SKILLS.map(skill => {
    const current = currentScores[skill.id];
    const threshold = thresholds?.[skill.id]?.[categoryKey];
    const trend = trends[skill.id];
    const gap = (current !== null && current !== undefined && threshold && threshold !== "NA")
      ? (Number(threshold) - current).toFixed(1) : null;
    return {
      skill: skill.label,
      categoria: SKILL_CATEGORIES.find(c=>c.id===skill.category)?.label,
      actual: current !== null && current !== undefined ? current : "N/A",
      umbral_categoria: threshold || "N/A",
      gap: gap !== null ? Number(gap) : null,
      tendencia: trend
    };
  }).filter(s => s.actual !== "N/A");

  skillSummary.sort((a,b) => (b.gap||0) - (a.gap||0));

  const formalSessions = sessions.filter(s=>s.is_formal).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const coachNotes = notes.filter(n=>n.source==="coach").slice(0,3).map(n=>n.note || n.text).join("\n- ");

const callClaudeAPI = async (prompt) => {
  const response = await fetch(
    `${SUPABASE_URL}/functions/v1/ai-recommendations`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
      },
      body: JSON.stringify({ prompt })
    }
  );
  const data = await response.json();
  if (data.error) throw new Error(data.error);
  const text = data.text || "";
  if (!text) throw new Error("Empty response from Edge Function");
  return JSON.parse(text.replace(/```json|```/g, "").trim());
};

const getAIRecommendations = async (player, sessions, notes, thresholds, currentScores, token) => {
  const lastSession = [...sessions].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const lastSessionId = lastSession?.id;
  const cached = await sb.get(token, "ai_recommendations", `?player_id=eq.${player.id}&order=generated_at.desc&limit=1`);
  if (cached && Array.isArray(cached) && cached.length > 0) {
    const cache = cached[0];
    if (cache.session_id === lastSessionId) {
      return { coach_payload: cache.coach_payload, player_payload: cache.player_payload, fromCache: true };
    }
  }
  const prompt = buildAIPrompt(player, sessions, notes, thresholds, currentScores);
  const result = await callClaudeAPI(prompt);
  await sb.post(token, "ai_recommendations", {
    player_id: player.id,
    session_id: lastSessionId,
    coach_payload: result.coach_view,
    player_payload: result.player_view,
  });
  return { coach_payload: result.coach_view, player_payload: result.player_view, fromCache: false };
};

function AIRecommendations({ player, sessions, notes, thresholds, currentScores, token, isPlayerView=false }) {
  const [recs, setRecs] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [fromCache, setFromCache] = useState(false);

  useEffect(() => {
    if (!sessions.length) { setLoading(false); return; }
    getAIRecommendations(player, sessions, notes, thresholds, currentScores, token)
      .then(result => { setRecs(result); setFromCache(result.fromCache); setLoading(false); })
      .catch(err => { setError(err.message); setLoading(false); });
  }, [player.id, sessions.length]);

  const priorityColor = p => p==="alta"?C.danger:p==="media"?C.warning:C.success;
  const trendIcon = t => t==="subiendo"?"📈":t==="bajando"?"📉":"➡️";

    <div style={{background:C.card,borderRadius:14,padding:16,border:`1px solid ${C.border}`,marginBottom:16}}>

    </div>
  );

    <div style={{background:C.danger+"11",borderRadius:14,padding:16,border:`1px solid ${C.danger}33`,marginBottom:16}}>

      <div style={{fontSize:11,color:C.muted,marginTop:4}}>{error}</div>
    </div>
  );

  if (!recs || !sessions.length) return (
    <div style={{background:C.card,borderRadius:14,padding:16,border:`1px solid ${C.border}`,marginBottom:16}}>
      <div style={{fontSize:13,color:C.muted,textAlign:"center"}}>Sin sesiones suficientes para generar recomendaciones</div>

  if (isPlayerView) return (
    <div style={{marginBottom:16}}>

        <div style={{fontSize:13,fontWeight:800,color:C.accent}}>🧠 Tu plan de esta semana</div>

          <div style={{fontSize:12,color:C.text,lineHeight:1.5}}>{r.mensaje}</div>
        </div>
      ))}

  return (
    <div style={{marginBottom:16}}>

      </div>
      {(recs.coach_payload||[]).map((r,i)=>(
